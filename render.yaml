services:
  - type: web
    name: x-unyou-webapp
    runtime: python
    buildCommand: pip install -r requirements.txt
    # 起動前に ensure-schema でスキーマ差分を冪等に適用してから gunicorn を起動する。
    # ensure-schema が失敗しても「|| true」で起動は止めない（全断を避ける）。失敗はログに残る。
    startCommand: python -m flask --app wsgi ensure-schema || true; gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: BASE_URL
        value: https://x-unyou-webapp.onrender.com
      - key: FLASK_APP
        value: wsgi
