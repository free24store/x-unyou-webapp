services:
  - type: web
    name: x-unyou-webapp
    runtime: python
    buildCommand: pip install -r requirements.txt
    # 起動を最優先で確実にポートバインドさせる。ensure-schema は SQLite ならローカル
    # ファイル操作で即完了（ネットワーク待ちが無い）。|| true で失敗しても gunicorn を止めない。
    startCommand: python -m flask --app wsgi ensure-schema || true; gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      # NOTE: 2026-07-23 本番502(Port scan timeout)対応で Postgres(DATABASE_URL)/seed/S3 を一旦撤去。
      #       まず基盤の起動（ポートバインド）を確実にする。未設定時は config.py が SQLite に
      #       フォールバック（＝ephemeral・再デプロイで消える）。
      #       Postgres は基盤が上がったことを確認後、Renderダッシュボードで手動作成→DATABASE_URL設定で
      #       安全に再導入する（自動プロビジョニングは接続待ちで起動がブロックされ502になったため）。
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: BASE_URL
        value: https://x-unyou-webapp.onrender.com
      - key: FLASK_APP
        value: wsgi
