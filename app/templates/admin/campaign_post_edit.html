{% extends "base.html" %}
{% block title %}投稿編集 — X yb boost{% endblock %}
{% block sidebar %}{% include "partials/_sidebar_admin.html" %}{% endblock %}
{% block content %}
<h2 class="h4 mb-3">✏️ 投稿テキストを編集する</h2>

<div class="card" style="max-width:600px">
  <div class="card-body">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label fw-bold">予約日時</label>
        <input type="datetime-local" name="scheduled_at" class="form-control"
               value="{{ post.scheduled_at.strftime('%Y-%m-%dT%H:%M') }}">
      </div>

      <div class="mb-3">
        <label class="form-label fw-bold">投稿テキスト</label>
        <textarea name="text" class="form-control" rows="6" id="post-text">{{ post.text }}</textarea>
        <div class="d-flex justify-content-between mt-1">
          <div class="form-text">X は140字まで</div>
          <span id="char-count" class="small text-muted">0 / 140字</span>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">保存する</button>
        <a href="{{ url_for('admin.story_campaign_list') }}" class="btn btn-outline-secondary">キャンセル</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const ta = document.getElementById('post-text');
const cc = document.getElementById('char-count');
function updateCount() {
  const len = ta.value.length;
  cc.textContent = `${len} / 140字`;
  cc.className = len > 140 ? 'small text-danger fw-bold' : 'small text-muted';
}
ta.addEventListener('input', updateCount);
updateCount();
</script>
{% endblock %}
