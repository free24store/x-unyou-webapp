{% extends "base.html" %}
{% block title %}クライアント追加{% endblock %}
{% block sidebar %}{% include "partials/_sidebar_master.html" %}{% endblock %}
{% block content %}
<h4 class="mb-4">クライアント追加</h4>
<div class="card" style="max-width: 600px;">
  <div class="card-body">
    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">クライアント名（会社名・アカウント名）</label>
        <input type="text" name="name" class="form-control" required>
      </div>
      <hr>
      <h6>管理者アカウント</h6>
      <div class="mb-3">
        <label class="form-label">メールアドレス</label>
        <input type="email" name="admin_email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">パスワード</label>
        <input type="password" name="admin_password" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">表示名</label>
        <input type="text" name="admin_display" class="form-control" placeholder="管理者">
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">作成</button>
        <a href="{{ url_for('master.client_list') }}" class="btn btn-outline-secondary">キャンセル</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
