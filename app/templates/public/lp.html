<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif; }
    section { padding: 3rem 1rem; }
    @media(max-width:576px) { section { padding: 2rem 0.75rem; } }
  </style>
</head>
<body>
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="alert alert-{{ cat }} text-center mb-0 rounded-0">{{ msg }}</div>
  {% endfor %}
{% endwith %}

{{ page.body_html | safe }}

<footer class="text-center py-4 text-muted small bg-dark text-light">
  <p class="mb-0">&copy; {{ page.created_at.year }} All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
