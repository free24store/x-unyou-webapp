<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>お問い合わせ — {{ client.name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for cat, msg in messages %}
  <div class="alert alert-{{ cat }} text-center mb-0 rounded-0">{{ msg }}</div>
  {% endfor %}
{% endwith %}

<div class="container py-5" style="max-width:560px">
  <h1 class="h3 text-center mb-4">お問い合わせ</h1>
  <div class="card shadow-sm">
    <div class="card-body">
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="source" value="{{ source or 'direct' }}">
        <input type="hidden" name="source_detail" value="{{ source_detail or '' }}">
        <div class="mb-3">
          <label class="form-label">お名前 <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">メールアドレス <span class="text-danger">*</span></label>
          <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">電話番号（任意）</label>
          <input type="tel" name="phone" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">お問い合わせ内容 <span class="text-danger">*</span></label>
          <textarea name="body" class="form-control" rows="5" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">送信する</button>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
